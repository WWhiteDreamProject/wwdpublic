# ============================
# Обработанные детали (выход верстака)
# ============================

# Обработанный ствол
- type: entity
  id: NCProcessedBarrel
  name: обработанный ствол
  description: Выточенный на ЧПУ-станке ствол. Готов к финальной сборке.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/wrench.rsi
      state: icon
    - type: NCWeaponPart
      partType: Barrel

# Обработанная рамка
- type: entity
  id: NCProcessedFrame
  name: обработанная рамка
  description: Полимерная рамка, готовая к сборке.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/wrench.rsi
      state: icon
    - type: NCWeaponPart
      partType: Frame

# Обработанная плата
- type: entity
  id: NCProcessedBoard
  name: печатная плата
  description: Печатная плата управления, готовая к сборке.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/wrench.rsi
      state: icon
    - type: NCWeaponPart
      partType: Board
