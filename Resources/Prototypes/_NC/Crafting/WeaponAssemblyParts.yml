# ============================
# Обработанные детали (выход верстака)
# ============================

# Обработанный ствол
- type: entity
  id: NCProcessedBarrel
  name: обработанный ствол
  description: Выточенный на ЧПУ-станке ствол. Готов к финальной сборке.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/wrench.rsi
      state: icon
    - type: NCWeaponPart
      partType: Barrel

# Обработанная рамка
- type: entity
  id: NCProcessedFrame
  name: обработанная рамка
  description: Полимерная рамка, готовая к сборке.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/wrench.rsi
      state: icon
    - type: NCWeaponPart
      partType: Frame

# Обработанная плата
- type: entity
  id: NCProcessedBoard
  name: печатная плата
  description: Печатная плата управления, готовая к сборке.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/wrench.rsi
      state: icon
    - type: NCWeaponPart
      partType: Board

# ============================
# Чертежи для сборки (Этап 3)
# ============================

# Чертеж АК-образного карабина (Тестовый)
- type: entity
  id: NCBlueprintTestAk
  name: чертеж "Карабин Улицы"
  description: Диск с инструкциями по сборке и физический каркас под детали. При неверной сборке самоуничтожится.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/wrench.rsi
      state: icon
    - type: NCBlueprint
      resultEntity: WeaponRifleAk
      garbageEntity: Wrench
      steps:
        - part: Frame
          doAfterTime: 2.0
          sound:
            path: /Audio/Items/handling_gun.ogg
        - part: Barrel
          doAfterTime: 2.0
          sound:
            path: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        - tool: Screwing
          doAfterTime: 3.0
          sound:
            path: /Audio/Items/screwdriver2.ogg
        - part: Board
          doAfterTime: 1.5
          sound:
            path: /Audio/Machines/button.ogg
        - tool: Pulsing
          doAfterTime: 2.5
          sound:
            path: /Audio/Items/multitool.ogg
