# Тестовый верстак
- type: entity
  name: ЧПУ-станок Найт-Сити
  id: NCWeaponWorkbench
  description: Высокотехнологичный станок для вытачивания деталей оружия.
  parent: BaseMachinePowered
  components:
    - type: Sprite
      sprite: Structures/Machines/protolathe.rsi
      snapCardinals: true
      layers:
      - state: icon
        map: ["enum.LatheVisualLayers.IsRunning"]
      - state: unlit
        shader: unshaded
        map: ["enum.PowerDeviceVisualLayers.Powered"]
      - state: inserting
        map: ["enum.MaterialStorageVisualLayers.Inserting"]
      - state: panel
        map: ["enum.WiresVisualLayers.MaintenancePanel"]
    - type: NCWeaponWorkbench
    - type: UserInterface
      interfaces:
        enum.NCWeaponWorkbenchUiKey.Key:
          type: NCWeaponWorkbenchBoundUserInterface
    - type: ActivatableUI
      key: enum.NCWeaponWorkbenchUiKey.Key
    - type: ContainerContainer
      containers:
        workbench_material_slot: !type:ContainerSlot
