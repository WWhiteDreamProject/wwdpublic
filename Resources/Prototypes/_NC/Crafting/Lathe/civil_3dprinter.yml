- type: entity
  id: NC3dPrinterCivilian
  parent: [BaseLatheLube, BaseMaterialSiloUtilizer]
  name: 3д принтер общего назначения
  description: Конвертирует сырье в продвинутые предметы.
  components:
  - type: Sprite
    sprite: _NC/Structures/Machines/getto_protolathe.rsi
    snapCardinals: true
    layers:
    - state: getto_icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: getto_unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: getto_panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Machine
    board: ProtolatheMachineCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
      - Sheet
      - RawMaterial
      - Ingot
      - Wooden
      - ClothMade
      - Gauze
      - Metal
  - type: Lathe
    idleState: getto_icon
    runningState: getto_building
    unlitIdleState: getto_unlit
    unlitRunningState: getto_unlit-building
    staticPacks:
    - NCDebugAll
    dynamicPacks:
    - AdvancedTools

