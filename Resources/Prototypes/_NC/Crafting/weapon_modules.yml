# ============================
# Чертежи для сборки
# ============================

# Чертеж АК-образного карабина (Тестовый)
- type: entity
  id: NCBlueprintTestAk
  name: чертеж "Карабин Улицы"
  description: Диск с инструкциями по сборке и физический каркас под детали. При неверной сборке самоуничтожится.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/wrench.rsi
      state: icon
    - type: NCBlueprint
      resultEntity: WeaponRifleAk
      garbageEntity: Wrench
      steps:
        - part: Frame
          prototype: NCProcessedFrameT2
          doAfterTime: 2.0
        - part: Barrel
          prototype: NCProcessedBarrelT2
          doAfterTime: 2.0
        - tool: Screwing
          doAfterTime: 3.0
        - part: Internals
          prototype: NCProcessedInternalsT2
          doAfterTime: 2.5
        - part: Board
          prototype: NCProcessedElectronicsT2
          doAfterTime: 1.5
        - tool: Pulsing
          doAfterTime: 2.5
