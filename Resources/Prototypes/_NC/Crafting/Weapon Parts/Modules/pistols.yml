# ============================
# Чертежи Пистолетов (Pistols)
# ============================

# Hello Cutie (Tier 1)
- type: entity
  id: NCBlueprintHelloCutie
  name: чертеж "Hello Cutie"
  description: Диск с инструкциями по сборке и физический каркас под детали для пистолета Hello Cutie.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: Objects/Tools/blueprint.rsi
      state: icon
    - type: NCBlueprint
      resultEntity: WeaponPistolHelloCutie
      garbageEntity: Scrap
      steps:
        - part: Frame
          prototype: NCProcessedFrameT1
          doAfterTime: 2.0
        - part: Barrel
          prototype: NCProcessedBarrelT1
          doAfterTime: 2.0
        - tool: Screwing
          doAfterTime: 3.0
        - part: Internals
          prototype: NCProcessedInternalsT1
          doAfterTime: 2.5
        - tool: Screwing
          doAfterTime: 2.5

