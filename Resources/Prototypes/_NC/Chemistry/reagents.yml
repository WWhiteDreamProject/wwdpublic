- type: reagent
  id: GunpowderNC
  name: Порох
  group: Elements
  desc: Взрывчатое вещество для патронов.
  physicalDesc: Серый порошок.
  color: "#404040"
  tileReactions:
  - !type:SpillToStackReaction
    entity: MaterialGunpowder

- type: reagent
  id: Yeast
  name: Дрожжи
  group: Foods
  desc: На вид рассыпчатые и влажные.
  physicalDesc: Рассыпчатое и влажное.
  flavor: bitter
  color: "#d2b48c"
  metabolisms:
    Food:
      metabolismRate: 0.5
      effects:
      - !type:SatiateHunger
        factor: 1.5
      - !type:Drunk
        boozePower: 0.05

- type: reagent
  id: CornSmoothie
  name: Кукурузный смузи
