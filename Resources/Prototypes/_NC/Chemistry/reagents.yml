- type: reagent
  id: WhiteMatter
  name: Белое вещество
  group: Elements
  desc: Важный компонент нервной системы, богатый миелином.
  physicalDesc: Белое и маслянистое.
  flavor: metallic
  color: "#f0f0f0"

- type: reagent
  id: NeuroStim
  name: НейроСтим
  group: Narcotics
  desc: На вид вещество пенное. Служит основой для продвинутых нейростимуляторов.
  physicalDesc: Пенное.
  flavor: metallic
  color: "#e0f7fa"
  metabolisms:
    Narcotic:
      metabolismRate: 0.5
      effects: []

- type: reagent
  id: PrimeTime
  name: Прайм Тайм
  group: Narcotics
  desc: На вид как последняя надежда. Экстремальный стимулятор с фатальными побочными эффектами.
  physicalDesc: Ярко-голубое и светящееся.
  flavor: metallic
  color: "#00ffff"
  metabolisms:
    Narcotic:
      metabolismRate: 0.5
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 1
            Asphyxiation: 1
      - !type:NCDrugLogicEffect
        headGibChance: 0.03
        legDropChance: 0.04

- type: reagent
  id: SixGun
  name: Шестистволка
  group: Narcotics
  desc: На вид как безумство. Дает невероятную скорость ценой собственного тела.
  physicalDesc: Пульсирующее фиолетовое.
  flavor: bitter
  color: "#4b0082"
  metabolisms:
    Narcotic:
      metabolismRate: 0.5
      effects:
      - !type:Jitter
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
        time: 3
      - !type:ChemVomit
        probability: 0.1
      - !type:NCDrugLogicEffect
        armDropChance: 0.03
        legDropChance: 0.04
        blindChance: 0.15
        laughChance: 0.2

- type: reagent
  id: NitroPolymer
  name: Нитро-полимер
  group: Elements
  desc: На вид глянцевое. Едкий запах. Используется для производства боеприпасов.
  physicalDesc: Глянцевое и едкое.
  flavor: chemical
  color: "#3a3a3a"
  metabolisms:
    Poison:
      metabolismRate: 0.5
      effects:
      - !type:ChemVomit
        probability: 0.6
      - !type:HealthChange
        damage:
          types:
            Poison: 2
      - !type:Drunk
        boozePower: 0.5

- type: reagent
  id: BioEthanol
  name: Био-этанол
  group: Foods
  desc: На вид сильно пахнущее. Получено путем ферментации.
  physicalDesc: Сильно пахнущее.
  flavor: alcohol
  color: "#b05b3c"
  metabolisms:
    Alcohol:
      metabolismRate: 0.5
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 0.02
            Blunt: -0.03
            Slash: -0.03
            Piercing: -0.04
      - !type:ChemVomit
        probability: 0.1
      - !type:Drunk
        boozePower: 40
