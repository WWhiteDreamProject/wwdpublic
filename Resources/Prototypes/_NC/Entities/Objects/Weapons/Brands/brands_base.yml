    durability: 100
    maxDurability: 100
    degradationRate: 0.8
    jamChance: 0.02
    recoilDamagePenalty: 2   # 2 урона Blunt стрелку за выстрел (без кибер-рук)
    spreadMultiplier: 1.3    # Потеря точности в очередях

# Militech — «Военная приемка»
