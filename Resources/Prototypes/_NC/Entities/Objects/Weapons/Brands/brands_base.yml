# Kang Tao — «Китайский смарт-линк»
# Бонус точности, но прицел иногда сбоит.
# TODO: Механика ложного захвата цели требует интеграции с targeting-системой
- type: entity
  id: NCBrandKangTao
  abstract: true
  components:
