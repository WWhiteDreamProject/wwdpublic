# Базовые шаблоны оружейных брендов Найт-Сити
# Каждый бренд — абстрактный шаблон с настроенным NCWeapon-компонентом.
# Конкретное оружие наследует: parent: [BaseWeaponPistol, NCBrand<Name>]
# и получает все механики бренда автоматически.

#region ТИР-0: «Одноразовый пластик» (Плохое качество)
# Общее: нельзя починить, быстрый износ, дешёвое.

# GunMart — «Клин-машина»
# Высокий шанс зажевать патрон. Быстрая деградация.
- type: entity
  id: NCBrandGunMart
  abstract: true
  components:
  - type: Clothing
    equipDelay: 0.5
    unequipDelay: 0.5
  - type: NCWeapon
    manufacturer: GunMart
    tier: Poor
    durability: 40
    maxDurability: 40
    degradationRate: 3
    jamChance: 0.2         # 20% шанс заклинить
    unjamTime: 3           # 3 сек на извлечение патрона
    isRepairable: false

# BudgetArms — «Пластиковый сюрприз»
# При критической поломке ствол взрывается в руках.
- type: entity
  id: NCBrandBudgetArms
  abstract: true
  components:
  - type: Clothing
    equipDelay: 0.5
    unequipDelay: 0.5
  - type: NCWeapon
    manufacturer: BudgetArms
    tier: Poor
    durability: 35
    maxDurability: 35
    degradationRate: 2.5
    jamChance: 0.05
    unjamTime: 1
    explodeChance: 0.1    # 10% шанс взрыва за выстрел (x3 при прочности <30%)
    isRepairable: false
    explodeSound:
      collection: ExplosionSmall
    explodeDamage:
      types:
        Blunt: 15
        Heat: 10

# Darra Polytechnic — «Критический перегрев»
# Дешёвые сплавы не держат температуру. Термический урон владельцу.
- type: entity
  id: NCBrandDarraPolytechnic
  abstract: true
  components:
  - type: Clothing
    equipDelay: 0.5
    unequipDelay: 0.5
  - type: NCWeapon
    manufacturer: DarraPolytechnic
    tier: Poor
    durability: 45
    maxDurability: 45
    degradationRate: 2
    jamChance: 0.03
    unjamTime: 1
    overheatHeat: 15        # Быстро набирает тепло
    overheatThreshold: 60   # Низкий порог перегрева
    cooldownRate: 3          # Медленно остывает
    isRepairable: false
    overheatDamage:
      types:
        Heat: 8
    overheatSound:
      path: /Audio/Effects/sizzle.ogg

# Sanroo — «Детская баллистика»
# Огромный разброс и минимальный урон.
- type: entity
  id: NCBrandSanroo
  abstract: true
  components:
  - type: Clothing
    equipDelay: 0.5
    unequipDelay: 0.5
  - type: NCWeapon
    manufacturer: Sanroo
    tier: Poor
    durability: 50
    maxDurability: 50
    degradationRate: 1.5
    jamChance: 0.04
    unjamTime: 1
    spreadMultiplier: 2.5   # Разброс x2.5
    damageMultiplier: 0.5   # Урон x0.5
    isRepairable: false

# Dai Lung — «Китайская рулетка»
# Шанс безвозвратного уничтожения оружия при каждом выстреле.
- type: entity
  id: NCBrandDaiLung
  abstract: true
  components:
  - type: Clothing
    equipDelay: 0.5
    unequipDelay: 0.5
  - type: NCWeapon
    manufacturer: DaiLung
    tier: Poor
    durability: 30
    maxDurability: 30
    degradationRate: 2
    jamChance: 0.08
    unjamTime: 1
    breakChance: 0.25      # 25% шанс рассыпаться за выстрел
    isRepairable: false
    breakSound:
      collection: MetalBreak

#endregion

#region ТИР-1: «Рабочие лошадки» (Стандартное качество)
# Общее: надёжно, скучно, требует чистки.

# Federated Arms — «Кирпич с курком»
# Клинит редко, но медленно достаётся из кобуры.
- type: entity
  id: NCBrandFederatedArms
  abstract: true
  components:
  - type: Clothing
    equipDelay: 1.5
    unequipDelay: 1.5
  - type: NCWeapon
    manufacturer: FederatedArms
    tier: Standard
    durability: 100
    maxDurability: 100
    degradationRate: 0.5
    jamChance: 0.01
    drawTimeMultiplier: 1.5  # На 50% дольше достаёшь

# Constitution Arms — «Удар копытом»
# Убойная сила выше среднего, но сильная отдача.
