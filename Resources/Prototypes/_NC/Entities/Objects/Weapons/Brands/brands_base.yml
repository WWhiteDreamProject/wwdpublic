  - type: NCWeapon
    manufacturer: ChadranArms
    tier: Standard
    durability: 100
    maxDurability: 100
    degradationRate: 0.6
    jamChance: 0.02
    meleeDamageBonus: 5      # Мощный приклад

# Mustang Arms — «Патрульный стандарт»
# Увеличенные магазины, но долгая перезарядка.
- type: entity
  id: NCBrandMustangArms
  abstract: true
