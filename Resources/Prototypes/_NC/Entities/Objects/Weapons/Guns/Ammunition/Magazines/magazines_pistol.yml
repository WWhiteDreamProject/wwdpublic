- type: entity
  id: MagazinePistolHelloCutie
  name: magazine hello cutie (.35 auto)
  parent: [ BaseItem, BaseRestrictedContraband ]
  components:
  - type: Tag
    tags:
    - MagazinePistolHelloCutie
  - type: BallisticAmmoProvider
    mayTransfer: true
    proto: CartridgePistol
    whitelist:
      tags:
      - CartridgePistol
    capacity: 12
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _NC/Objects/Weapons/Guns/Pistol/hello_cutie.rsi
    layers:
    - state: hello-cutie
      map: ["enum.GunVisualLayers.Base"]
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: Appearance

