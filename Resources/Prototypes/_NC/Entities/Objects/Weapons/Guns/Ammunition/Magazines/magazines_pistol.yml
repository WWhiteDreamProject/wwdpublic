- type: entity
  id: MagazinePistolStukach
  name: магазин Стукача Томми (.35 авто)
  description: Вместительный магазин для пистолета-дробовика Стукач Томми. Вмещает 8 патронов.
  parent: BaseMagazinePistol
  components:
  - type: BallisticAmmoProvider
    capacity: 8
    proto: CartridgeMagnum
  - type: Sprite
    layers:
    - state: red
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Tag
    tags:
    - MagazinePistolStukach

