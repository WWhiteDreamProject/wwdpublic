- type: entity
  id: MagazineRifleNomad
  name: магазин пневматического гвоздемета (.20 винтовочный)
  description: Самодельный магазин для пневматического гвоздемета Кочевников. Вмещает 8 гвоздей.
  parent: BaseMagazineRifle
  components:
  - type: BallisticAmmoProvider
    capacity: 8
    proto: CartridgeRifle
  - type: Sprite
    layers:
    - state: red
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Tag
    tags:
    - MagazineRifle

