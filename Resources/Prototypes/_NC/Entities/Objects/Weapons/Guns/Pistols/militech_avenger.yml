- type: entity
  name: Militech "AVENGER"
  parent: [BaseWeaponPistol, NCBrandMilitech]
  id: WeaponPistolAvenger
  description: 'Тяжелый армейский пистолет с квадратным силуэтом, ценящийся за эталонную надежность Militech и пробивную мощь калибра .45 в любых условиях «Четвертой корпоративной».'
  components:
  - type: Sprite
    sprite: _NC/Objects/Weapons/Guns/Pistol/militech_avenger.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _NC/Objects/Weapons/Guns/Pistol/militech_avenger.rsi
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolAvenger
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolAvenger
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Gun
    fireRate: 3
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/pistol.ogg
    fireOnDropChance: 0.3


# Пустой вариант для лута
- type: entity
  name: Militech "AVENGER"
  parent: WeaponPistolAvenger
  id: WeaponPistolAvengerEmpty
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: null
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        whitelist:
          tags:
          - MagazinePistolAvenger
