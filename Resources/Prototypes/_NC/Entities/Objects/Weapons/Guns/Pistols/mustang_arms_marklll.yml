- type: entity
  name: Mustang Arms Mark III
  parent: [BaseWeaponPistol, NCBrandMustangArms]
  id: WeaponPistolMarkIII
  description: 'Пистолет Mustang Arms "Mark III" — это стандартный по качеству тяжёлый пистолет. Он был разработан как преемник Mustang Arms Mark II, но спешка с его выпуском во время Четвёртой корпоративной войны привела к тому, что он оказался даже хуже.'
  components:
  - type: Sprite
    sprite: _NC/Objects/Weapons/Guns/Pistol/Mustang_Arms_MarkIII.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _NC/Objects/Weapons/Guns/Pistol/mustang_arms_markIII.rsi
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolMarkIII
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolMarkIII
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Gun
    fireRate: 3
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/pistol.ogg
    fireOnDropChance: 0.3


# Пустой вариант для лута
- type: entity
  name: Mustang Arms Mark III
  parent: WeaponPistolMarkIII
  id: WeaponPistolMarkIIIEmpty
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: null
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        whitelist:
          tags:
          - MagazinePistolMarkIII

