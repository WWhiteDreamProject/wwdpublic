
- type: entity
  parent: BaseItem
  id: NCProgramBase
  name: netrunning program
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Devices/cartridges.rsi
    state: cart
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - NCProgramCartridge
  - type: NetProgram
    programType: Network
    ramCost: 1
    energyCost: 0
    duration: 5.0

- type: entity
  parent: NCProgramBase
  id: NCProgramPing
  name: Ping 1.0
  description: Reveals information about the target's network security.
  components:
  - type: NetProgram
    programType: Quickhack
    quickhackType: Ping
    ramCost: 2
    beamColor: "#00FF00"

- type: entity
  parent: NCProgramBase
  id: NCProgramBlind
  name: Optics Rewrite
  description: Temporarily blinds the target.
  components:
  - type: NetProgram
    programType: Quickhack
    quickhackType: Blind
    ramCost: 40
    uploadTime: 2.0
    duration: 10.0
    beamColor: "#000000"

- type: entity
  parent: NCProgramBase
  id: NCProgramDrop
  name: Weapon Glitch
  description: Forces the target to drop their active item.
  components:
  - type: NetProgram
    programType: Quickhack
    quickhackType: WeaponDrop
    ramCost: 30
    uploadTime: 1.0
    beamColor: "#FFFF00"

- type: entity
  parent: NCProgramBase
  id: NCProgramShock
  name: Short Circuit
  description: Deals electrical damage to the target.
  components:
  - type: NetProgram
    programType: Quickhack
    quickhackType: Damage
    ramCost: 50
    uploadTime: 1.5
    damage: 15
    stunDuration: 5.0
    beamColor: "#0000FF"

- type: entity
  parent: NCProgramBase
  id: NCProgramBreach
  name: Breach 1.0
  description: Instantly cracks Gate passwords.
  components:
  - type: NetProgram
    programType: Network
    ramCost: 50
    damage: 100
    beamColor: "#00FF00"

- type: entity
  parent: NCProgramBase
  id: NCProgramSword
  name: Digital Sword
  description: Offensive program. High damage against ICE.
  components:
  - type: NetProgram
    programType: Network
    ramCost: 15
    damage: 20
    beamColor: "#FF0000"

- type: entity
  parent: NCProgramBase
  id: NCProgramShield
  name: Net Shield
  description: Reduces incoming damage from ICE retaliations.
  components:
  - type: NetProgram
    programType: Network
    ramCost: 20
    defense: 10
    duration: 10.0
    beamColor: "#00FFFF"

- type: entity
  parent: NCProgramBase
  id: NCProgramHighJack
  name: HighJack 1.0
  description: Connects to the target's network architecture, revealing all ICE layers.
  components:
  - type: NetProgram
    programType: Quickhack
    quickhackType: HighJack
    ramCost: 40
    uploadTime: 2.0
    beamColor: "#FF00FF"

# Backdoor: Safe exit from network architecture
- type: entity
  parent: NCProgramBase
  id: NCProgramBackdoor
  name: Backdoor 1.0
  description: Creates a safe exit point. Use during hacking to disconnect without neural feedback damage.
  components:
  - type: NetProgram
    programType: Network
    ramCost: 5
    damage: 0
    defense: 0
    beamColor: "#00FF00"
