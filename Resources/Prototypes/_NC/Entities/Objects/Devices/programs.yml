
- type: entity
  parent: BaseItem
  id: NCProgramBase
  name: netrunning program
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Devices/cartridges.rsi
    state: cart
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - NCProgramCartridge
  - type: NetProgram
    programType: Network
    ramCost: 1
    energyCost: 0
    duration: 5.0

- type: entity
  parent: NCProgramBase
  id: NCProgramPing
  name: Ping 1.0
  description: A basic network diagnostic tool.
  components:
  - type: NetProgram
    programType: Network
    ramCost: 2
    beamColor: "#00FF00"

- type: entity
  parent: NCProgramBase
  id: NCProgramBlind
  name: Optics Rewrite
  description: Temporarily blinds the target.
  components:
  - type: NetProgram
    programType: Quickhack
    quickhackType: Blind
    ramCost: 4
    uploadTime: 2.0
    duration: 10.0
    beamColor: "#000000"

- type: entity
  parent: NCProgramBase
  id: NCProgramDrop
  name: Weapon Glitch
  description: Forces the target to drop their active item.
  components:
  - type: NetProgram
    programType: Quickhack
    quickhackType: WeaponDrop
    ramCost: 3
    uploadTime: 1.0
    beamColor: "#FFFF00"

- type: entity
  parent: NCProgramBase
  id: NCProgramShock
  name: Short Circuit
  description: Deals electrical damage to the target.
  components:
  - type: NetProgram
    programType: Quickhack
    quickhackType: Damage
    ramCost: 5
    uploadTime: 1.5
    damage: 15
    stunDuration: 5.0
    beamColor: "#0000FF"


