- type: entity
  parent: NCProgramBase
  id: NCProgramHighJack
  name: Хайджек 1.0
  description: Подключается к сетевой архитектуре цели, раскрывая все слои ICE.
  components:
  - type: NetProgram
    programType: Quickhack
    quickhackType: HighJack
    ramCost: 20
    uploadTime: 2.0
    beamColor: "#FF00FF"

# Backdoor: Safe exit from network architecture
- type: entity
  parent: NCProgramBase
  id: NCProgramBackdoor
  name: Бэкдор 1.0
  description: Создает безопасную точку выхода. Используйте при взломе для отключения без нейронного урона.
  components:
  - type: NetProgram
    programType: Network
    ramCost: 5
    damage: 0
    defense: 0
    beamColor: "#00FF00"
