# NC — Ключи шифрования корпоративных каналов CitiNet
# Вшиваются в гарнитуры или табельные Агенты (PDA)

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyNCPD
  name: NCPD encryption key
  description: A cipher chip used by Night City Police Department officers.
  components:
  - type: EncryptionKey
    channels:
    - NCPD
    defaultChannel: NCPD
  - type: Sprite
    layers:
    - state: crypt_blue
    - state: sec_label

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyTraumaTeam
  name: Trauma Team encryption key
  description: A cipher chip used by Trauma Team International medical staff.
  components:
  - type: EncryptionKey
    channels:
    - TraumaTeam
    defaultChannel: TraumaTeam
  - type: Sprite
    layers:
    - state: crypt_gray
    - state: med_label

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyMaxTac
  name: MAX-TAC encryption key
