- type: entity
  id: VehicleVendor
  parent: BaseComputer
  name: Vehicle Purchase Console
  description: A console to purchase personal vehicles.
  components:
  - type: VehicleVendor
    vehicles:
    - protoId: VehicleAmeriCar
      name: AmeriCar
      price: 1500
    - protoId: VehicleATV
      name: ATV
      price: 500
    - protoId: VehicleJanicart
      name: Janicart
      price: 400
    - protoId: VehicleSecway
      name: Secway
      price: 600
    - protoId: VehicleHoverchair
      name: Hoverchair
      price: 800
  - type: Sprite
    noRot: true
    sprite: Structures/Machines/VendingMachines/laptop.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Transform
    anchored: true
    noRot: true
  - type: ActivatableUI
    key: enum.VehicleVendorUiKey.Key
  - type: UserInterface
    interfaces:
      enum.VehicleVendorUiKey.Key:
        type: VehicleVendorBoundUserInterface
