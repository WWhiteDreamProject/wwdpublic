- type: entity
  id: BaseNCAirlock
  parent: Airlock
  abstract: true
  name: дверь
  components:
  - type: Sprite
    sprite: _NC/Structures/Doors/Door.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
    - state: closed_unlit
      map: ["enum.DoorVisualLayers.BaseUnlit"]
      shader: unshaded
    - state: welded
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: bolted_unlit
      map: ["enum.DoorVisualLayers.BaseBolted"]
      shader: unshaded
    - state: emergency_unlit
      map: ["enum.DoorVisualLayers.BaseEmergencyAccess"]
      shader: unshaded


- type: entity
  id: NCAirlockGeneral
  parent: BaseNCAirlock
  name: дверь
  components:
  - type: Sprite
  - type: AccessReader
    access: [["NC_General"]]

- type: entity
  id: NCAirlock
  parent: BaseNCAirlock
  name: дверь
  suffix: "квартира"
  components:
  - type: Sprite
  - type: UserInterface
    interfaces:
      enum.DoorInterfaceUiKey.Key:
        type: DoorInterfaceBoundUserInterface
  - type: DoorInterface
    price: 1500
    address: "Апартаменты"
  - type: AccessReader
    access: [["NC_General"]]
