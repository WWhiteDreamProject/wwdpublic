- type: entity
  id: NCBaseFactionBankConsole
  parent: BaseComputer
  name: corporate bank console
  abstract: true
  components:
  - type: FactionBankConsole
  - type: ActivatableUI
    key: enum.FactionBankConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.FactionBankConsoleUiKey.Key:
        type: FactionBankConsoleBoundUserInterface
  - type: ContainerContainer
    containers:
      cash_slot: !type:Container {}
      board: !type:Container {}

- type: entity
  id: NCConsoleCityAdmin
  parent: NCBaseFactionBankConsole
  name: city admin bank console
  components:
  - type: FactionBankConsole
    bankAccount: CityAdmin
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: command
    - map: ["computerLayerKeys"]
      state: generic_keys
  - type: AccessReader
    access: [["Command"]]

