- type: entity
  id: NCTraumaComputer
  parent: BaseComputer
  name: консоль Trauma Team
  description: Консоль для мониторинга клиентов платиновой подписки.
  components:
  - type: TraumaComputer
  - type: CitiNetMap
    visibleGroups: ["Public", "TraumaTeam"]
  - type: ActivatableUI
    key: enum.TraumaComputerUiKey.Key
  - type: UserInterface
    interfaces:
      enum.TraumaComputerUiKey.Key:
        type: TraumaComputerBoundUserInterface

- type: entity
  id: NCOverwatchConsole
  parent: BaseComputer
  name: консоль Overwatch
  description: Мощный центральный терминал, принимающий тревоги от сети "Око Сити".
  components:
  - type: OverwatchConsole
  - type: CitiNetMap
    visibleGroups: ["Public", "NCPD"]
  - type: SurveillanceCameraMonitor
  - type: ActivatableUI
    key: enum.OverwatchConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.OverwatchConsoleUiKey.Key:
        type: OverwatchConsoleBoundUserInterface
      enum.SurveillanceCameraMonitorUiKey.Key:
        type: SurveillanceCameraMonitorBoundUserInterface

- type: entity
  parent: BaseComputerAiAccess
  id: ComputerOverwatch
  name: диспетчерская консоль Overwatch
  description: Консоль, используемая сетью Overwatch NCPD; отображает оповещения о выстрелах и взрывах.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: security
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#1f8c28"
  - type: Computer
    board: StationRecordsComputerCircuitboard
  - type: ActivatableUI
    key: enum.OverwatchConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.OverwatchConsoleUiKey.Key:
        type: OverwatchConsoleBoundUserInterface
      enum.SurveillanceCameraMonitorUiKey.Key:
        type: SurveillanceCameraMonitorBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface
  - type: SurveillanceCameraMonitor
  - type: OverwatchConsole
  - type: CitiNetMap
    visibleGroups: ["Public", "NCPD"]
  - type: AccessReader
    access:
      - ["NCPD"]
  - type: ApcPowerReceiver
    powerLoad: 1000
