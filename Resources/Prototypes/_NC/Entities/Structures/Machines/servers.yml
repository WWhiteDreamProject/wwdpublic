- type: entity
  parent: BaseStructure
  id: NCServerBase
  name: net server
  abstract: true
  components:
  - type: Sprite
    sprite: Structures/Machines/server.rsi
    state: server
  - type: NetServer
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: InteractionOutline
  - type: Rotatable
  - type: Anchorable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: NodeContainer
    examinable: true
    nodes:
      input:
        !type:CableDeviceNode
        nodeGroupID: MVPower
  - type: UserInterface
    interfaces:
      enum.NetServerUiKey.Key:
        type: NetServerBoundUserInterface
        interactionRange: 30
  - type: ActivatableUI
    key: enum.NetServerUiKey.Key

- type: entity
  parent: NCServerBase
  id: NCMicroServer
  name: micro-server
  description: A budget server rack with 3 ICE floors.
  components:
  - type: Sprite
    sprite: Structures/Machines/server.rsi
    state: server
  - type: ItemSlots
    slots:
      ice_slot_1:
        name: Floor 1 (Perimeter)
        whitelist: { tags: [ NCIceBoard ] }
      ice_slot_2:
        name: Floor 2
        whitelist: { tags: [ NCIceBoard ] }
      ice_slot_3:
        name: Floor 3 (Root)
        whitelist: { tags: [ NCIceBoard ] }
  - type: ContainerContainer
    containers:
      ice_slot_1: !type:ContainerSlot
      ice_slot_2: !type:ContainerSlot
      ice_slot_3: !type:ContainerSlot

