- type: entity
  id: NcpdForensicsConsole
  name: NCPD forensic console
  parent: BaseMachinePowered
  description: Lists flatline alerts across the station.
  components:
  - type: Sprite
    sprite: Structures/Machines/server.rsi # stub sprite
    state: server
  - type: NcpdForensicsConsole
  - type: ActivatableUI
    key: enum.NcpdForensicsConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.NcpdForensicsConsoleUiKey.Key:
        type: NcpdForensicsConsoleBoundUserInterface
  - type: AccessReader
    access: [["Security"]]
