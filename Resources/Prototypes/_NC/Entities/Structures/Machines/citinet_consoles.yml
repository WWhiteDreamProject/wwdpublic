- type: entity
  id: CitiNetConsoleNCPD
  parent: BaseComputer
  name: тактическая консоль NCPD
  description: Терминал сети Overwatch для координации оперативных групп.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: security
    - map: ["computerLayerKeys"]
      state: generic_keys
  - type: CitiNetMap
    visibleGroups: ["Public", "NCPD"]
  - type: ActivatableUI
    key: enum.CitiNetMapUiKey.Key
  - type: UserInterface
    interfaces:
      enum.CitiNetMapUiKey.Key:
        type: CitiNetMapConsoleBoundUserInterface
  - type: AccessReader
    access:
      - ["NCPD"]

- type: entity
