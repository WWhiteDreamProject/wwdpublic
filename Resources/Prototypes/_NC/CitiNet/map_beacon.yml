- type: entity
  id: MapBeaconAnchor
  name: Map POI Anchor
  suffix: CitiNet
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        hard: false
  - type: Sprite
    sprite: Markers/cross.rsi
    state: cross
    color: "#00ff00" # Зеленый крестик для маяков
    drawdepth: SmallObjects
  - type: MapBeacon
    label: "New POI"
    color: "#00ffff"
    icon: /Textures/Interface/VerbIcons/information.svg.192dpi.png
    visibleInWorld: true
