    title: Убить всех. Плоть слаба.
    description: Уничтожьте всех органиков, которых встретите.
    icon:
      sprite: Objects/Weapons/Melee/sword.rsi
      state: icon
  - type: RoleplayObjective

- type: antag
  id: Cyberpsycho
  name: Киберпсих
  antagonist: true
  objective: Убить всех. Плоть слаба.

- type: entity
