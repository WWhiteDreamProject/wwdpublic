    antagPrototype: Cyberpsycho
    exclusiveAntag: false
    roleType: SoloAntagonist
  - type: CyberpsychoRoleRole

# --- ЯЗЫК КИБЕРПСИХОЗА ---
- type: language
  id: Cyberpsycho
  name: Кибер-бред
  description: Язык сломанного разума.
  speechOverride:
    fontId: Monospace
  obfuscation:
    !type:SyllableObfuscation
    minSyllables: 1
    maxSyllables: 1
    replacement:
    - "ГР-Р-Р"
    - "А-А-А"
    - "ТЫ ВСЕГО ЛИШЬ МЯСО"
    - "ТЫ ВСЕГО ЛИШЬ МЯСО ДЛЯ ЕБЛИ"
    - "ТЫ ВСЕГО ЛИШЬ МЯСО И Я ТЕБЯ СЪЕМ"
    - "ЖАЛКАЯ ПЛОТЬ"
    - "ПЛОТЬ СЛАБА"
    - "КОНЕЦ БЛИЗОК"
    - "ХРОМ ТРЕБУЕТ ЖЕРТВ!"
    - "ХРОМ ТРЕБУЕТ КРОВИ!"
    - "ХРОМ ТРЕБУЕТ МЯСА!"
    - "ЧТО ТЫ СЕБЕ ВООБРАЖАЕШЬ, КАК ТЫ МОЖЕШЬ МЕНЯ ОСТАНОВИТЬ?"
    - "Я СЪЕМ ТЕБЯ ЦЕЛИКОМ!"
    - "СВОБОДА - ЭТО СМЕРТЬ!"
    - "ЧЕРТОВЫ КРИПЫ"
    - "СВЕЖЕЕ МЯСО"
