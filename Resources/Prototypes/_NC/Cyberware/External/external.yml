# --- KEVLAR SUBLAYER TIER 1 ---
- type: entity
  id: CyberwareExternalKevlarSublayer
  parent: BaseCyberwareImplant
  name: "Moore Tech 'Carapace'"
  description: "The cheapest street protection. Layers of ballistic kevlar are stitched under the skin. Saves from stray bullets of street gangs and shivs, but the skin in implantation areas becomes rough and loses sensitivity, and the body breathes poorly."
  components:
  - type: CyberwareImplant
    category: External
    humanityCost: 7
  - type: Armor
    modifiers:
      coefficients:
        Piercing: 0.15

# --- THERMOPLASTIC ARMOR TIER 2 ---
- type: entity
  id: CyberwareExternalThermoplasticArmor
  parent: BaseCyberwareImplant
  name: "Raven 'Aegis'"
  description: "Standard for undercover detectives and mid-level corporate security. This is not just fabric, but a smart polymer that hardens upon sudden kinetic impact, dissipating energy over a large area."
  components:
  - type: CyberwareImplant
    category: External
    humanityCost: 10
  - type: Armor
    modifiers:
      coefficients:
        Piercing: 0.25
        Heat: 0.1

# --- REACTIVE SUBLAYER TIER 3 ---
- type: entity
  id: CyberwareExternalReactiveSublayer
  parent: BaseCyberwareImplant
  name: "Militech 'Dragon Scale'"
  description: "Elite military development. Microscales of boron carbide and graphene connected by an elastic nano-mesh. The armor is so strong it can stop a round from an assault rifle at point-blank range. Looks human, but feels like a concrete wall."
  components:
  - type: CyberwareImplant
    category: External
    humanityCost: 14
  - type: Armor
    modifiers:
      coefficients:
        Piercing: 0.4
        Slash: 0.3
        Blunt: 0.2
