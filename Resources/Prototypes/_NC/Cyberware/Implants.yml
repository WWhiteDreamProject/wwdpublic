- type: entity
  id: BaseCyberwareImplant
  parent: BaseItem
  name: "Базовый киберимплант"
  description: "Кусок высокотехнологичного хрома. Требуется Автодок для установки."
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    layers:
    - state: datadisk_base
    - state: datadisk_label
  - type: CyberwareImplant
    category: None
    humanityCost: 0
    refundPercentage: 0.5

- type: entity
  id: CyberwareOpticsKiroshi
  parent: BaseCyberwareImplant
  name: "Оптика Kiroshi 'Клервойя'"
  description: "Оптический имплант базового уровня. Улучшает зрение и интегрируется с нейроинтерфейсом."
  components:
  - type: CyberwareImplant
    category: Optics
    humanityCost: 14

- type: entity
  id: CyberwareArmsGorilla
  parent: BaseCyberwareImplant
  name: "Руки Гориллы (Правая)"
  description: "Усиленный мышечный каркас для правой руки. Позволяет поднимать тяжести."
  components:
  - type: CyberwareImplant
    category: RightArm
    humanityCost: 20

- type: entity
  id: CyberwareLegsLynx
  parent: BaseCyberwareImplant
  name: "Лапы Рыси (Левая)"
  description: "Амортизирующие суставы для бесшумного передвижения."
  components:
  - type: CyberwareImplant
    category: LeftLeg
    humanityCost: 16

# --- SANDEVISTAN TIER 1 ---
- type: entity
  id: CyberwareNeuroSandevistanMk1
  parent: BaseCyberwareImplant
  name: "Zetatech Sandevistan Mk.1"
  description: "Нейронный ускоритель базового уровня. Умеренно ускоряет, но быстро сжигает стамину."
  components:
  - type: CyberwareImplant
    category: Neuroport
    humanityCost: 20
  - type: Sandevistan
    speedMultiplier: 1.4
    attackSpeedMultiplier: 1.5
    maxDuration: 4.0
    activationHumanityCost: 5.0
    staminaDrainPerSecond: 10.0
    humanityLossPerInterval: 1.0
    overloadStunDuration: 3.0
    overloadDamage:
      types:
        Toxin: 10
        Blunt: 5

# --- SANDEVISTAN TIER 3 (APOGEE) ---
- type: entity
  id: CyberwareNeuroSandevistanApogee
  parent: BaseCyberwareImplant
