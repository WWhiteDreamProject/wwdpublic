# --- BIO-INHIBITOR TIER 1 ---
- type: entity
  id: CyberwareNeuroBioInhibitorStoic
  parent: BaseCyberwareImplant
  name: "Biotechnica Stoic"
  description: "Biotechnica specializes in biology and chemistry. Their pain suppressor is not just wires, but hardware embedded in the spinal cord that constantly injects a cocktail of synthetic endorphins and adrenaline into the bloodstream upon taking damage."
  components:
  - type: CyberwareImplant
    category: Neuroport
    humanityCost: 7
    cyberFamily: Neuroport
  - type: StaminaDamageResistance
    coefficient: 0.6

# --- NEURO-BLOCKER TIER 2 ---
- type: entity
  id: CyberwareNeuroBlockerAegis
  parent: BaseCyberwareImplant
  name: "Trauma Team Aegis"
  description: "Expensive medical standard. Trauma Team installs these on their paramedics so they can extract clients from crossfire even if they themselves get hit by a stray bullet."
  components:
  - type: CyberwareImplant
    category: Neuroport
    humanityCost: 10
    cyberFamily: Neuroport
  - type: CyberwareSlowImmunity

# --- TACTICAL SUPPRESSOR TIER 3 ---
- type: entity
  id: CyberwareNeuroTacticalSpartan
  parent: BaseCyberwareImplant
  name: "Militech Spartan"
  description: "Strict army standard. Designed for corporate wars. It literally severs neural connections responsible for transmitting pain signals to the brain, leaving only dry information about damage."
  components:
  - type: CyberwareImplant
    category: Neuroport
    humanityCost: 14
    cyberFamily: Neuroport
  - type: CyberwareAntiGlare
  - type: CritModifier
    critThresholdModifier: 100
    deadThresholdModifier: 0
