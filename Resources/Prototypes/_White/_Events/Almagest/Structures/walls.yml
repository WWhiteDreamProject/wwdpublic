# Girder
- type: entity
  id: AlmagestGirder
  parent: Girder
  name: almagest girder
  description: "This girder can be used to make 3 types of wall: structural-resistant wall - 1 plasteel, laser-resistant wall - 1 glass, piercing-resistant wall - 1 steel."
  components:
  - type: Sprite
    sprite: Structures/Walls/solid.rsi
    state: reinforced_wall_girder
  - type: Construction
    graph: AlmagestGirder
    node: almagestGirder
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 2
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak

# Walls
- type: entity
  parent: BaseWall
  id: WallAlmagestBase
  abstract: true
  components:
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: AlmagestWallStructural
  - type: ExplosionResistance
    damageCoefficient: 0.7
  - type: RadiationBlocker
    resistance: 6
  - type: IconSmooth
    key: walls
  - type: Appearance
  - type: StaticPrice
    price: 250

- type: entity
  parent: WallAlmagestBase
  id: WallAlmagestStructuralResistant
  name: structural-resistant wall
  components:
  - type: Damageable
    damageModifierSet: AlmagestWallStructural
  - type: ExplosionResistance
    damageCoefficient: 0.025
  - type: Construction
    graph: AlmagestGirder
    node: wallAlmagestStructural
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 2500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Sprite
    sprite: Structures/Walls/plastitanium.rsi
  - type: Icon
    sprite: Structures/Walls/plastitanium.rsi
  - type: IconSmooth
    base: plastitanium

- type: entity
  parent: WallAlmagestBase
  id: WallAlmagestLaserResistant
  name: laser-resistant wall
  components:
