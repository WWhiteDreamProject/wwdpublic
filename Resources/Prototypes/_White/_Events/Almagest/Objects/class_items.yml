    # Grenades
- type: entity
  parent: BaseItem
  id: PackageGrenadeShrapnel
  name: shrapnel grenade package
  description: A small package containing a shrapnel grenade. Packaging disintegrates when opened.
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: Objects/Weapons/Grenades/shrapnelgrenade.rsi
    layers:
    - state: paper_2
      sprite: Objects/Materials/Sheets/other.rsi
    - state: icon
      offset: 0.03125, 0.09375
  - type: SpawnItemsOnUse
    items:
    - id: GrenadeShrapnel
    sound:
      path: /Audio/Effects/unwrap.ogg

