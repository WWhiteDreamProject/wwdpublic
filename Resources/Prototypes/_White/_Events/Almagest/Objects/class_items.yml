# Medic
- type: entity
  name: omnizine cryostasis beaker
  description: A cryostasis beaker filled with omnizine.
  parent: CryostasisBeaker
  id: OmnizineCryostasisBeaker
  components:
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 60
        canReact: false
        reagents:
        - ReagentId: Omnizine
          Quantity: 60

- type: entity
  name: epinephrine cryostasis beaker
  description: A cryostasis beaker filled with epinephrine.
  parent: CryostasisBeaker
  id: EpinephrineCryostasisBeaker
  components:
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 60
        canReact: false
        reagents:
        - ReagentId: Epinephrine
          Quantity: 60
