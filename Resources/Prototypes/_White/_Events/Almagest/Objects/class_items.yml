# Base
- type: entity
  name: select base weapon equipment
  parent: BaseItem
  id: AlmagestEquipmentWeaponBaseSelect
  description: "select base weapon equipment"
  components:
  - type: Item
    size: Huge
    shape:
      - 0,0,3,1
  - type: Sprite
    sprite: _White/Objects/Weapons/Guns/SMGs/golden_wt550.rsi
    state: icon
  - type: RadialEntityMorph
    entries:
    - prototype: WeaponSubMachineGunWt550
    - prototype: WeaponRifleLecter
    - prototype: WeaponShotgunEnforcer
    - prototype: WeaponLaserCarbine
  - type: UserInterface
    interfaces:
      enum.RadialSelectorUiKey.Key:
        type: TrackedRadialSelectorMenuBUI
  - type: ActivatableUI
    key: enum.RadialSelectorUiKey.Key
    inHandsOnly: true

    # ID
- type: entity
  name: Almagest ID card
  parent: IDCardStandard
  id: AlmagestIDCardBase
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: black
    - state: department
      color: "#333333"
    - state: subdepartment
      color: "#878787"
    - state: death
  - type: PresetIdCard
    job: ERTLeader
  - type: AgentIDCard
  - type: ActivatableUI
    key: enum.AgentIDCardUiKey.Key
    inHandsOnly: true
  - type: UserInterface
    interfaces:
      enum.AgentIDCardUiKey.Key:
        type: AgentIDCardBoundUserInterface
  - type: NanoChatCard
    listNumber: false

- type: entity
  name: red Almagest ID card
  parent: AlmagestIDCardBase
  id: AlmagestIDCardRed
  suffix: Almagest
  components:
  - type: Sprite
    layers:
    - state: black
    - state: department
      color: "#333333"
    - state: subdepartment
      color: "#f55f78"
    - state: death
      color: "#f55f78"

- type: entity
  name: blue Almagest ID card
  parent: AlmagestIDCardBase
  id: AlmagestIDCardBlue
  suffix: Almagest
  components:
  - type: Sprite
    layers:
    - state: black
    - state: department
      color: "#333333"
    - state: subdepartment
      color: "#5fa5f5"
    - state: death
      color: "#5fa5f5"

    # PDA
- type: entity
