- type: entity
  parent: BaseHandheldComputer
  id: DebugAlmagestCommsHandheld
  name: Almagest Debug Communicator
  description: A handheld device for making announcements.
  components:
  - type: Sprite
    sprite: Objects/Devices/tablets.rsi
    layers:
    - state: tablet
    - state: generic
      shader: unshaded
  - type: CommunicationsConsole
    title: "[color=#14fffb]Almagest[/color]"
    color: "#ffffff"
    sound: /Audio/_White/Announcements/crashing.ogg
    delay: 0
    initialDelay: 0
    global: true
    canShuttle: false
  - type: ActivatableUI
    key: enum.CommunicationsConsoleUiKey.Key
    inHandsOnly: true
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.CommunicationsConsoleUiKey.Key:
        type: CommunicationsConsoleBoundUserInterface

- type: entity
  name: Almagest Debug Gun
  parent: BaseItem
  id: AlmagestDebugGun
  components:
  - type: Item
    size: Large
  - type: Sprite
    sprite: _White/Objects/Weapons/Guns/Turrets/Almagest/equipment.rsi
    layers:
    - state: base
  - type: Gun
    fireRate: 12
    selectedMode: FullAuto
    projectileSpeed: 60
    availableModes:
    - Burst
    - FullAuto
    shotsPerBurst: 5
    burstFireRate: 8
    burstCooldown: 0.5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser.ogg
      params:
        volume: -5
  - type: BasicEntityAmmoProvider
    proto: BoltIRLaserHeavy
  - type: AmmoSelector
    prototypes:
    - AlmagestIRLaserHeavy
    - AlmagestIRLaserFast
    - AlmagestAnnihilatorHeavy
    - AlmagestAnnihilatorFast
    - AlmagestAnnihilatorShotgun
    - AlmagestHMGHeavy
    - AlmagestHMGFast
    - AlmagestRamPenetrator
    - AlmagestRamMine
    - AlmagestRamWalker
  - type: UserInterface
    interfaces:
      enum.AmmoSelectorUiKey.Key:
        type: AmmoSelectorMenuBoundUserInterface
  - type: ActivatableUI
    altVerb: true
    verbOnly: true
    verbText: mode-select-verb-text
    key: enum.AmmoSelectorUiKey.Key

