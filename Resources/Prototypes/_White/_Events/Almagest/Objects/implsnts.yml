# Captain
- type: entity
  parent: BaseSubdermalImplant
  id: AlmagestDeathRattleImplantCaptainRed
  name: Almagest
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      permanent: true
      whitelist:
        components:
        - MobState
    - type: TriggerOnMobstateChange
      mobState:
      - Alive
      - Dead
    - type: Rattle
      reviveMessage: deathrattle-implant-revive-message-red-captain
      deathMessage: deathrattle-implant-dead-message-red-captain
      radioChannel:
        - "Common"

- type: entity
  parent: AlmagestDeathRattleImplantCaptainRed
  id: AlmagestDeathRattleImplantCaptainRedToTeam
  name: Almagest
  categories: [ HideSpawnMenu ]
  components:
  - type: TriggerOnMobstateChange
    mobState:
    - Critical
  - type: Rattle
    critMessage: deathrattle-implant-critical-message-red-captain
    radioChannel:
    - "Prison"

- type: entity
