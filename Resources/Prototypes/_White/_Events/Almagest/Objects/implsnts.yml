    - "Medical"

# Medical
- type: entity
  parent: BaseSubdermalImplant
  id: AlmagestImplantMedic
  name: Almagest
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    permanent: true
  - type: AddComponentsImplant
    componentsToAdd:
    - type: SurgerySpeedModifier
      speedModifier: 3
