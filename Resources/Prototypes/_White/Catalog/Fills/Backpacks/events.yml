# Equip
- type: entity
  name: red captain equipment
  parent: BaseItem
  id: AlmagestAutoEquipmentRedCaptain
  description: "red captain equipment"
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: Clothing/Back/Backpacks/ertsec.rsi
    state: icon
  - type: AutoEquipment
    forceEquip: true
    doAfterDelay: 3.0
    breakOnMove: true
    equipmentSlots:
      mask: ClothingMaskBreath
      id: ERTLeaderPDA
      belt: ClothingBeltMilitaryWebbingAlmagestEquip
      neck: ClothingNeckCloakCap # Captain
      ears: ClothingHeadsetPrison # Red Headset
      outerClothing: ClothingOuterHardsuitAlmagestRed # Red Hardsuit
      back: ClothingBackpackAlmagestRedCaptain # Red Captain

