# Equip
- type: entity
  name: red equipment
  parent: BaseItem
  id: AmalgestEquipmentBaseRed
  description: "rede equipment"
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: Clothing/Back/Backpacks/ertsec.rsi
    state: icon
  - type: RadialEntityMorph
    entries:
    - prototype: ClothingBackpackAmalgestRedEquipEngineer
    - prototype: ClothingBackpackAmalgestRedMarine
  - type: UserInterface
    interfaces:
      enum.RadialSelectorUiKey.Key:
        type: TrackedRadialSelectorMenuBUI
  - type: ActivatableUI
    key: enum.RadialSelectorUiKey.Key
    inHandsOnly: true

