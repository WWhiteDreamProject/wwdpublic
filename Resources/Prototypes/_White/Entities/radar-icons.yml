# search for "# TODO ADD RADAR ICON" for projectiles that lost their icons


- type: entity
  id: RadarIconPlaceholder
  abstract: true
  components:
  - type: PVSIgnore
  - type: RadarIcon
    radarRange: 256
    color: Silver
    scale: 2, 2 # such small size leads to considerable distortions even on very simple shapes, like this cross
    angle: 0
    lines:
    - points:
      - 1, 1
      - -1, -1
      noRot: true # no global noRot means we need to specify it on every line
    - points:
      - 1, -1
      - -1, 1
      noRot: true

- type: entity
  id: RadarIconPlaceholderPlus
  parent: RadarIconPlaceholder
  abstract: true
  components:
  - type: RadarIcon
    angle: 45 # turns "x" into "+"

- type: entity
  id: RadarIconCircledArrow
  abstract: true
  components:
  - type: PVSIgnore
  - type: RadarIcon
    radarRange: 256
    color: Orange # default color will be used by every line that doesn't have their own color specified
    scale: 5,5
    angle: 0
    lines:
    - points:
      - 0, -0.75
      - 0, 0.75
      color: Red # color override will be used on this line instead of the component's color
    - points:
      - -0.35, 0.25 # Fix this shitsystem of guns. All projectiles fly backwards
      - 0, 0.75
      - 0.35, 0.25
      color: Red
                # generated via python, code below for reference purposes
    - points:   # print(",\n".join([f"\"{math.sin(a*math.tau/10)*1.2}, {math.cos(a*math.tau/10)*1.2}\"" for a in range(0,11)])) #can be immediately copied into yaml without alterations
      - 0.0, 1.2
      - 0.7053423027509678, 0.9708203932499369
      - 1.141267819554184, 0.37082039324993693
      - 1.1412678195541843, -0.3708203932499368
      - 0.7053423027509679, -0.9708203932499367
      - 1.4695761589768238e-16, -1.2
      - -0.7053423027509677, -0.9708203932499371
      - -1.141267819554184, -0.37082039324993704
      - -1.1412678195541843, 0.37082039324993665
      - -0.705342302750968, 0.9708203932499367
      - -2.9391523179536476e-16, 1.2
      noRot: true # to avoid distortions on the circle piece when rotating


# shapes that are any more complicated *will* look ugly and warped
# due to lack of pixel alignment inside navconsole's UI.
- type: entity
  id: RadarIconWarning
  abstract: true
  components:
  - type: PVSIgnore
  - type: RadarIcon
    radarRange: 256
    color: Yellow
    scale: 5, 5
    angle: 0
    offset: 0, -1.1547
    lines:
    - points:  # triangle
      - -2, 0
      - 2,0
      - 0, 3.464102
      - -2, 0
      noRot: true
    - points: # exclamation mark's point
      - 0.25, 0.25
      - 0.25, 0.5
      - -0.25, 0.5
      - -0.25, 0.25
      - 0.25, 0.25
      noRot: true
    - points: # exclamation mark's line
      - 0.25, 0.75
      - 0.25, 2.75
      - -0.25, 2.75
      - -0.25, 0.75
      - 0.25, 0.75
      noRot: true
    - points: # small chevron to denote the travel direction # i think it looks cool
      - 0.5, 2.5 # might want to consider making it slightly wider though
      - 0, 3
      - -0.5, 2.5
      offset: 0, 1.1547
