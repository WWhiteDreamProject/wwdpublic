- type: entity
  id: BulletNeurotoxin
  parent: BulletAcid
  name: neurotoxin spit
  categories: [ HideSpawnMenu ]
  components:
  - type: StaminaDamageOnCollide
    damage: 65
  - type: Projectile
    damage:
      types:
        Caustic: 1

- type: entity
  id: BulletMediumRocket
  parent: BulletRocket
  components:
  - type: Explosive
    totalIntensity: 40

- type: entity
  id: PsionicHookProjectile
  name: grappling hook
  categories: [ HideSpawnMenu ]
  components:
    - type: Clickable
    - type: InteractionOutline
    - type: Sprite
      noRot: false
      sprite: Objects/Weapons/Guns/Launchers/grappling_gun.rsi
      layers:
      - state: hook
    - type: Physics
      bodyType: Dynamic
      linearDamping: 0
      angularDamping: 0
    - type: Projectile
      deleteOnCollide: false
      damage:
        types:
          Blunt: 0
    - type: Fixtures
      fixtures:
        projectile:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.1,-0.1,0.1,0.1"
          hard: false
          mask:
          - Impassable
          - BulletImpassable
    - type: ProjectilePsionicHook
      basePower: 15
      returnSpeed: 13
