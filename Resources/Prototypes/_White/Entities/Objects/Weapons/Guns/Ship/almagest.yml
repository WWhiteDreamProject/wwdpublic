# Base
- type: entity
  name: select ship weapon equipment
  parent: BaseItem
  id: AlmagestEquipmentWeaponShipSelect
  description: "select ship weapon equipment"
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: _White/Objects/Weapons/Guns/Turrets/Almagest/equipment.rsi
    state: base
  - type: RadialEntityMorph
    entries:
    - prototype: AlmagestEquipmentWeaponShipIRLaser
    - prototype: AlmagestEquipmentWeaponShipAnnihilator
    - prototype: AlmagestEquipmentWeaponShipHMG
    - prototype: AlmagestEquipmentWeaponShipRam
  - type: UserInterface
    interfaces:
      enum.RadialSelectorUiKey.Key:
        type: TrackedRadialSelectorMenuBUI
  - type: ActivatableUI
    key: enum.RadialSelectorUiKey.Key
    inHandsOnly: true

