# IR Heavy
- type: entity
  name : heavy laser bolt
  id: BoltIRLaserHeavy
  parent: [BulletLaser, RadarIconBoltIRLaser]
  categories: [ HideSpawnMenu ]
  components:
  - type: RadarIcon
    color: "#fc03ba"
    scale: 3, 3
  - type: Reflective
    reflective:
    - Energy
  - type: Projectile
    penetrate: true
    noPenetrateMask: 0
    penetrationChance: 0.66
    maxPenetrations: 2
    damage:
      types:
        Heat: 80
        Structural: 20
        Shock: 200
  - type: Sprite
    layers:
    - state: heavylaser
      shader: unshaded

- type: entity
  parent: WeaponShipLightIR
  id: WeaponShipIRHeavy
  name: Heavy IR Pulse Laser
  components:
  - type: Sprite
    sprite: _White/Objects/Weapons/Guns/Turrets/Almagest/IR_laser_heavy.rsi
    state: icon
  - type: Gun
    fireRate: 1
    selectedMode: FullAuto
    projectileSpeed: 75
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser.ogg
      params:
        volume: -5
  - type: ProjectileContainerBatteryAmmoProvider
    proto: BoltIRLaserHeavy
    fireCost: 1000
  - type: ModularTurretWeapon
    dollyMixSprite: _White/Objects/Weapons/Guns/Turrets/Almagest/IR_laser_heavy.rsi

