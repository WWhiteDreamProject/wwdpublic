# IR Heavy
- type: entity
  name : heavy laser bolt
  id: BoltIRLaserHeavy # TODO ADD RADAR ICON
  parent: [ BulletLaser, BulletRocket, RadarIconPlaceholder ]
  categories: [ HideSpawnMenu ]
  components:
  - type: Explosive
    totalIntensity: 20
  - type: Projectile
    damage:
      types:
        Heat: 120
        Structural: 80
  - type: Sprite
    layers:
    - state: heavylaser
      shader: unshaded

- type: entity
  parent: WeaponShipLightIR
  id: WeaponShipIRHeavy
  name: Heavy IR Pulse Laser
  components:
  - type: Sprite
    sprite: _White/Objects/Weapons/Guns/Turrets/Almagest/IR_laser_heavy.rsi
    state: icon
  - type: Gun
    fireRate: 0.5
    selectedMode: FullAuto
    projectileSpeed: 40
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser.ogg
      params:
        volume: -5
  - type: ProjectileContainerBatteryAmmoProvider
    proto: BoltIRLaserHeavy
    fireCost: 3000
  - type: ModularTurretWeapon
    dollyMixSprite: _White/Objects/Weapons/Guns/Turrets/Almagest/IR_laser_heavy.rsi

