# Ram Penetrator
- type: entity
  id: BulletBlastRamPenetrator
  parent: [BaseMeteor, RadarIconBulletHMG]
  name: blast ram penetrator
  categories: [ HideSpawnMenu ]
  components:
  - type: RadarIcon
    color: Red
    scale: 5, 5
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: impact_laser_greyscale
      color: "#ebbe1c"
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 4500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    intensitySlope: 5
    maxIntensity: 100
    totalIntensity: 150
  - type: SpawnOnDespawn
    prototype: BlastRamPenetratorExplosion
  - type: TimedDespawn
    lifetime: 0.25
  - type: Projectile
    penetrate: true
    noPenetrateMask: 0
    penetrationChance: 0.8
    maxPenetrations: 5
    damage:
      types:
        Piercing: 400
        Structural: 400
        Heat: 400
        Shock: 400
    deleteOnCollide: false

- type: entity
  parent: AdminInstantEffectBase
  id: BlastRamPenetratorExplosion
  categories: [ HideSpawnMenu ]
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    intensitySlope: 5
    maxIntensity: 100
    totalIntensity: 150
    canCreateVacuum: false

- type: entity
  parent: BaseWeaponShipLightEnergy
  id: WeaponShipRamPenetrator
  name: Penetrator Ram Blaset Launcher
  components:
  - type: Sprite
    sprite: _White/Objects/Weapons/Guns/Turrets/Almagest/ram_penetrator.rsi
    state: icon
  - type: Gun
    selectedMode: Burst
    projectileSpeed: 100
    availableModes:
    - Burst
    burstFireRate: 0.85
    burstCooldown: 30
    shotsPerBurst: 5
    minAngle: 15
    maxAngle: 120
    angleIncrease: 30
    angleDecay: 5
    soundGunshot:
      path: /Audio/Effects/Grenades/Supermatter/supermatter_start.ogg
      params:
        volume: 30
  - type: ProjectileContainerBatteryAmmoProvider
    proto: BulletBlastRamPenetrator
    fireCost: 2200
  - type: ModularTurretWeapon
    dollyMixSprite: _White/Objects/Weapons/Guns/Turrets/Almagest/ram_penetrator.rsi

