- type: entity
  id: WeaponMechToolbox
  parent: [ BaseMechWeaponMelee, SpecialMechEquipment ]
  name: заваренный утяжелённый ящик
  suffix: Mech Weapon, Melee, Combat
  description: Тулбокс, но очень тяжёлый, можно поместить в мех как модуль.
  components:
  - type: Tag
    tags:
    - WeaponMechToolbox
  - type: Construction
    graph: WeaponMechToolboxGraph
    node: WeaponMechToolbox
  - type: Sprite
    state: tidemechtoolbox
    sprite: _White/Objects/Specific/Mech/MechWeapon.rsi
  - type: MeleeWeapon
    canHeavyAttack: false
    autoAttack: true
    angle: 0
    soundHit:
      path: "/Audio/Weapons/smash.ogg"
    attackRate: 1.65
    damage:
      types:
        Structural: 25
        Blunt: 20
  - type: MeleeThrowOnHit
    speed: 4
    distance: 0.4
  - type: KnockdownOnHit 
    delay: 0
    knockdownTime: 0
    jitterTime: 1
    stutterTime: 1