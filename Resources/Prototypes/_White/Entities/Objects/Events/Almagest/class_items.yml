# Base
- type: entity
  name: select base weapon equipment
  parent: BaseItem
  id: AlmagestEquipmentWeaponBaseSelect
  description: "select base weapon equipment"
  components:
  - type: Item
    size: Huge
    shape:
      - 0,0,3,1
  - type: Sprite
    sprite: _White/Objects/Weapons/Guns/SMGs/golden_wt550.rsi
    state: icon
  - type: RadialEntityMorph
    entries:
    - prototype: WeaponSubMachineGunWt550
    - prototype: WeaponRifleLecter
    - prototype: WeaponShotgunEnforcer
    - prototype: WeaponLaserCarbine
  - type: UserInterface
    interfaces:
      enum.RadialSelectorUiKey.Key:
        type: TrackedRadialSelectorMenuBUI
  - type: ActivatableUI
    key: enum.RadialSelectorUiKey.Key
    inHandsOnly: true

- type: entity
  parent: BaseFlatpack
  id: AlmagestGirderFlatpack
  name: almagest girder flatpack
  suffix: 1, alma flatpack
  description: A flatpack used for constructing a almagest girder. Can be placed on the floor.
  components:
  - type: Sprite
    layers:
    - state: solar-assembly-part
  - type: Flatpack
    entity: AlmagestGirder
  - type: Stack
    stackType: AlmagestGirderFlatpack
    count: 1
  - type: Item
    size: Normal
  - type: SpawnAfterInteract
    prototype: AlmagestGirderFlatpack
    doAfter: 0.1
    removeOnInteract: true

- type: entity
  parent: AlmagestGirderFlatpack
  id: AlmagestGirderFlatpack30
  suffix: 30, alma flatpack
  components:
  - type: Stack
    count: 30

- type: stack
  id: AlmagestGirderFlatpack
  name: almagest girder flatpack
  icon: { sprite: Objects/Misc/solar_assembly.rsi, state: solar-assembly-part }
  spawn: AlmagestGirderFlatpack
  maxCount: 30

