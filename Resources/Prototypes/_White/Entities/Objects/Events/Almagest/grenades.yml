# Captain
- type: entity
  id: AlmagestGrenadeCaptain
  name: captain grenade
  parent: BaseItem
  components:
  - type: Tag
    tags:
    - MortarGrenade
  - type: CartridgeAmmo
    proto: BulletAlmagestGrenadeCaptain
    deleteOnSpawn: true
  - type: Item
    size: Small
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    color: "#3c74cf"
    layers:
    - state: blast
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: blast
    suffix: false

- type: entity
  parent: [BaseMeteor, RadarIconWarning]
  id: BulletAlmagestGrenadeCaptain
  categories: [ HideSpawnMenu ]
  components:
  - type: RadarIcon
    radarRange: 512
    color: "#668fd1"
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    layers:
    - state: blast
  - type: Projectile
    penetrate: true
    noPenetrateMask: 0
    maxPenetrations: 5
    damage:
      types:
        Piercing: 400
        Structural: 400
        Heat: 400
        Shock: 800
  - type: Explosive
    explosionType: Default
    totalIntensity: 150
    intensitySlope: 5
    maxIntensity: 10
  - type: ProjectileGrenade
    fillPrototype: PelletAlmagestGrenadeCaptain
    capacity: 5
    minVelocity: 3
    maxVelocity: 15
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 2550
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ExplodeBehavior
      - !type:TriggerBehavior

- type: entity
  parent: [BaseBullet, RadarIconWarning]
  id: PelletAlmagestGrenadeCaptain
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    penetrate: true
    noPenetrateMask: 0
    damage:
      types:
        Piercing: 0
  - type: Sprite
    sprite: Objects/Weapons/Grenades/singularitygrenade.rsi
    layers:
    - state: primed
      shader: unshaded
  - type: ActiveTimerTrigger
    timeRemaining: 0.3
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/Grenades/Supermatter/smbeep.ogg
      params:
        volume: -5
  - type: SoundOnTrigger
    removeOnTrigger: true
    sound:
      path: /Audio/Effects/Grenades/Supermatter/supermatter_start.ogg
      volume: 5
  - type: AnchorOnTrigger
    removeOnTrigger: true
  - type: TwoStageTrigger
    triggerDelay: 10
    components:
    - type: TimedDespawn
      lifetime: 11
    - type: AmbientSound
      enabled: true
      volume: -5
      range: 14
      sound:
        path: /Audio/Effects/Grenades/Supermatter/supermatter_loop.ogg
    - type: EmpOnTrigger
      range: 5
      energyConsumption: 500
      disableDuration: 10
    - type: ProjectileGrenade
      fillPrototype: PelletAlmagestGrenadeMarine
      capacity: 15
      minVelocity: 10
      maxVelocity: 15
    - type: ContainerContainer
      containers:
        cluster-payload: !type:Container
    - type: GravityWell
      maxRange: 8
      baseRadialAcceleration: 6
      baseTangentialAcceleration: 4
      gravPulsePeriod: 0.03
    - type: SingularityDistortion
      intensity: 150
      falloffPower: 1.5
    - type: PointLight
      enabled: true
      color: "#ffaa44"
      energy: 8
      radius: 6
      softness: 1
      offset: "0, 0"
    - type: SoundOnTrigger
      sound:
        path: /Audio/Effects/Grenades/Supermatter/supermatter_end.ogg
        params:
          volume: 5
    - type: DeleteOnTrigger

