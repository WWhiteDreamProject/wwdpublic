# Medic
- type: entity
  id: AlmagestGrenadeMedic
  name: medic grenade
  parent: BaseItem
  components:
    - type: Tag
      tags:
        - MortarGrenade
    - type: CartridgeAmmo
      proto: BulletAlmagestGrenadeMedic
      deleteOnSpawn: true
    - type: Item
      size: Small
    - type: Sprite
      sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
      color: Cyan
      layers:
        - state: blast
          map: ["enum.AmmoVisualLayers.Base"]
    - type: Appearance
    - type: SpentAmmoVisuals
      state: blast
      suffix: false

- type: entity
  parent: [BaseMeteor, RadarIconWarning]
  id: BulletAlmagestGrenadeMedic
  categories: [ HideSpawnMenu ]
  components:
    - type: RadarIcon
      radarRange: 512
      color: Cyan
    - type: Sprite
      sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
      layers:
        - state: blast
    - type: Projectile
      penetrate: true
      noPenetrateMask: 0
      maxPenetrations: 5
      damage:
        types:
          Piercing: 400
          Structural: 400
          Heat: 400
          Shock: 800
    - type: Explosive
      explosionType: Cryo
      totalIntensity: 50
      intensitySlope: 5
      maxIntensity: 10
    - type: SmokeOnTrigger
      duration: 10
      spreadAmount: 50
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 2550
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak
          - !type:TriggerBehavior
          - !type:ExplodeBehavior
          - !type:WeightedSpawnEntityBehavior
            weightedEntityTable: AlmagestGrenadeMedicTable
            spawnOffset: 5
            minSpawn: 50
            maxSpawn: 75
            spawnAfter: 0.5

- type: entity
  id: AlmagestGrenadeMedicSpawner
  parent: MarkerBase
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityTableSpawner
    offset: 0.2
    table: !type:NestedSelector
      tableId: AlmagestGrenadeMedicSpawnerTable

- type: entityTable
  id: AlmagestGrenadeMedicSpawnerTable
  table: !type:GroupSelector
    children:
    - !type:GroupSelector
      weight: 2
      children:
      - id: MobSpiderSpace
    - !type:GroupSelector
      weight: 1
      children:
      - id: MobCarpHolo
    - !type:GroupSelector
      weight: 15
      children:
      - id: SpiderWeb

- type: weightedRandomEntity
  id: AlmagestGrenadeMedicTable
  weights:
    AlmagestGrenadeMedicSpawner: 1
