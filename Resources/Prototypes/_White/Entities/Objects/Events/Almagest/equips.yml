# Hardsuit
- type: entity
  parent: ClothingOuterHardsuitERTSecurity
  id: ClothingOuterHardsuitAlmagestRed
  components:
  - type: Unremoveable

- type: entity
  parent: ClothingOuterHardsuitERTLeader
  id: ClothingOuterHardsuitAlmagestBlue
  components:
  - type: Unremoveable

# Starting Gear Base

- type: startingGear
  id: AlmagestRedBaseGear
  equipment:
    outerClothing: ClothingOuterHardsuitAlmagestRed
    id: ERTLeaderPDA
    mask: ClothingMaskBreath
    belt: ClothingBeltMilitaryWebbingAlmagestEquip
    shoes: ClothingShoesBootsCombatFilled
    ears: ClothingHeadsetPrison

- type: startingGear
  id: AlmagestBlueBaseGear
  equipment:
    outerClothing: ClothingOuterHardsuitAlmagestBlue
    id: ERTLeaderPDA
    mask: ClothingMaskBreath
    belt: ClothingBeltMilitaryWebbingAlmagestEquip
    shoes: ClothingShoesBootsCombatFilled
    ears: ClothingHeadsetMedical

# Starting Gear Class

# Captain
- type: startingGear
  id: AlmagestCaptainGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitCaptain
    neck: ClothingNeckCloakCap
    eyes: ClothingEyesGlassesSunglasses
    pocket1: AlmagestGrenadeCaptain

- type: startingGear
  id: AlmagestCaptainGearRed
  equipment:
    back: ClothingBackpackAlmagestRedCaptain

- type: startingGear
  id: AlmagestCaptainGearBlue
  equipment:
    back: ClothingBackpackAlmagestBlueCaptain

