# Hardsuit
- type: entity
  parent: ClothingOuterHardsuitERTSecurity
  id: ClothingOuterHardsuitAlmagestRed
  components:
  - type: Unremoveable

- type: entity
  parent: ClothingOuterHardsuitERTLeader
  id: ClothingOuterHardsuitAlmagestBlue
  components:
  - type: Unremoveable

# Equip Red
- type: entity
  name: red equipment
  parent: BaseItem
  id: AlmagestEquipmentBaseRed
  description: "red equipment"
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: Clothing/Back/Backpacks/ertsec.rsi
    state: icon
  - type: RadialEntityMorph
    entries:
    - prototype: AlmagestAutoEquipmentRedEngineer
    - prototype: AlmagestAutoEquipmentRedMarine
    - prototype: AlmagestAutoEquipmentRedDemoman
    - prototype: AlmagestAutoEquipmentRedMedic
  - type: UserInterface
    interfaces:
      enum.RadialSelectorUiKey.Key:
        type: TrackedRadialSelectorMenuBUI
  - type: ActivatableUI
    key: enum.RadialSelectorUiKey.Key
    inHandsOnly: true

- type: entity
  name: red captain equipment
  parent: BaseItem
  id: AlmagestAutoEquipmentRedCaptain
  description: "red captain equipment"
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: Clothing/Back/Backpacks/ertsec.rsi
    state: icon
  - type: AutoEquipment
    forceEquip: true
    doAfterDelay: 3.0
    breakOnMove: true
    clearAllEquipment: true
    equipmentSlots:
      jumpsuit: ClothingUniformJumpsuitCaptain # Captain
      shoes: ClothingShoesBootsCombatFilled
      mask: ClothingMaskBreath
      id: ERTLeaderPDA
      belt: ClothingBeltMilitaryWebbingAlmagestEquip
      neck: ClothingNeckCloakCap # Captain
      eyes: ClothingEyesGlassesSunglasses # Captain
      ears: ClothingHeadsetPrison # Red Headset
      outerClothing: ClothingOuterHardsuitAlmagestRed # Red Hardsuit
      back: ClothingBackpackAlmagestRedCaptain # Red Captain

