- type: entity
  parent: VendingMachine
  id: CaptainDrobe
  name: CaptainDrobe
  description: Stylish uniform, for a strong leader!
  components:
  - type: VendingMachine
    pack: CaptainDrobeInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
  - type: Sprite
    sprite: _White/Structures/Machines/VendingMachines/captaindrobe.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    color: "#05DAF2"
  - type: AccessReader
    access: [["Captain"]]

- type: entity
  parent: VendingMachineTankDispenserEVA
  id: VendingMachineTankDispenserEVAEmergency
  suffix: EVA [O2, N2, Emergency]
  name: emergency gas tank dispenser
  description: A vendor for dispensing emergency gas tanks.
  components:
  - type: VendingMachine
    pack: TankDispenserEVAInventoryEmergency
  - type: Sprite
    sprite: Structures/Machines/VendingMachines/tankdispenser.rsi
    state: dispenser
