- type: entity
  id: GrenadeTrap
  parent: GrenadeTrapPoles
  name: booby trap
  description: An explosive surprise.
  components:
  - type: Sprite
    sprite: _White/Structures/Other/grenadetrap.rsi
    layers:
    - state: trap
  - type: Construction
    graph: GrenadeTrapGraph
    node: trap_full
  - type: Slippery
    slipSound:
      path: /Audio/Effects/packetrip.ogg
    launchForwardsMultiplier: 0
    paralyzeTime: 0
  - type: StepTrigger
    triggerGroups:
      types:
      - Landmine
    intersectRatio: 0.2
    requiredTriggeredSpeed: 0
  - type: TriggerOnStepTrigger
  - type: ItemSlots
    slots:
      grenade_slot:
        name: triggered
  - type: TriggerItemSlot
    slots:
      - grenade_slot
  - type: ContainerContainer
    containers:
      grenade_slot: !type:ContainerSlot 

