- type: entity
  id: GrenadeTrapPoles
  parent: BaseStructure
  name: booby trap
  categories: [ HideSpawnMenu ]
  description: An explosive surprise.
  components:
  - type: Sprite
    sprite: _White/Structures/Other/grenadetrap.rsi
    layers:
    - state: poles
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.9,-0.1,0.9,0.1"
        density: 60
        hard: false
        mask:
        - MachineMask
        layer:
        - LowImpassable
  - type: Construction
    graph: GrenadeTrapGraph
    node: trap_poles
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:DoActsBehavior
        acts: Destruction
