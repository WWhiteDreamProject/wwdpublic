- type: constructionGraph
  id: TideMechGraph
  start: start
  graph:
  - node: start
    edges:
    - to: TideMechBattery
      steps:
      - material: Steel
        amount: 4
        doAfter: 5
      - tag: PortableGeneratorJrPacmanMachineCircuitboard
        icon:
          sprite: Objects/Misc/module.rsi
          state: engineering
        name: Circuitboard J.R.P.A.C.M.A.N. 
      - material: Cable
        amount: 10
      - tag: PowerSensor
        icon:
          sprite: Objects/Devices/gates.rsi
          state: power_sensor
        name: power sensor
      - tag: ProximitySensor
        icon:
          sprite: Objects/Misc/proximity_sensor.rsi
          state: icon
        name: proximity sensor
      - tag: Pipe
        icon:
          sprite: Structures/Piping/Atmospherics/pipe.rsi
          state: pipeStraight
        name: pipe
      - material: CableMV
        amount: 5
  - node: TideMechBattery
    entity: TideMechBattery


