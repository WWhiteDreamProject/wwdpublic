stages:
  - prepare
  - validate
  - build
  - test
  - sync
  - package

variables:
  DOTNET_VERSION: "9.0.x"
  GIT_SUBMODULE_STRATEGY: recursive

.workflow_template: &workflow_template
  image: mcr.microsoft.com/dotnet/sdk:9.0-noble
  before_script:
    - apt-get update && apt-get install -y libfreetype6 python3
    - git submodule update --init --recursive
    - dotnet restore

yaml-linter:
  stage: validate
  <<: *workflow_template
  only:
    - master
    - staging
    - trying
    - merge_requests
  script:
    - dotnet build --configuration Release --no-restore /p:WarningsAsErrors= /m
    - dotnet run --project Content.YAMLLinter --no-build

validate-rsis:
  stage: validate
  image: python:3.11
  only:
    - staging
    - trying
    - merge_requests
  before_script:
    - pip install pillow jsonschema
  script:
    - python3 RobustToolbox/Schemas/validate_rsis.py Resources/

build:
  stage: build
  <<: *workflow_template
  script:
    - dotnet build --no-restore /p:WarningsAsErrors=nullable
  only:
    - master
    - staging
    - trying
    - merge_requests

test-unit:
  stage: test
  <<: *workflow_template
  only:
    - master
    - staging
    - trying
    - merge_requests
  script:
    - ls
    - dotnet test RobustToolbox/Robust.UnitTesting/Robust.UnitTesting.csproj -- NUnit.ConsoleOut=0
    - dotnet test RobustToolbox/Robust.Analyzers.Tests/Robust.Analyzers.Tests.csproj -- NUnit.ConsoleOut=0

