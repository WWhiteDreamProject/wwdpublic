gitlab_mr_labeler:
  stage: prepare
  image: golang:1.22-alpine
  variables:
    GITLAB_API_TOKEN: "$GITLAB_API_TOKEN"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $GITLAB_API_TOKEN != ""'
    - when: never
  before_script:
    - go install witch.wwdp.ee/CinkaFox/gitlab-mr-labeler@97dcdd8e102a2cd5ec6304667361b5af23d1bc46
  script:
    - gitlab-mr-labeler 
        -f .gitlab/labeler.yml 
        -t "${GITLAB_API_TOKEN}"
        --debug true
        --merge-request-id "${CI_MERGE_REQUEST_IID}"
        --project-id "${CI_PROJECT_ID}" 

sync-to-external-repo:
  stage: sync
  image: alpine:latest
  variables:
    GIT_DEPTH: "0"
    GIT_SUBMODULE_STRATEGY: none
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" && $GIT_REMOTE_URL != ""'
  
  before_script:
    - apk add --no-cache git
    - git config --global user.email "ci-bot@witch.wwdp.ee"
    - git config --global user.name "GitLab CI Bot"
  
  script:
    - git remote add target "$GIT_REMOTE_URL"
    - "git push target HEAD:master"
